<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
}

#reader{
width:300px;
margin:auto;
}

select,button{
padding:10px;
margin:10px;
font-size:16px;
}

#status{
margin-top:15px;
font-weight:bold;
}
</style>

</head>
<body>

<h2>QR Code Scanner</h2>

<label>Select Sheet</label><br>

<select id="sheetSelect">
<option>Loading sheets...</option>
</select>

<br>

<div id="reader"></div>

<p id="status"></p>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7IIjCLwOC_0crNebUXBoAj1eP4HFy3emV74Mk9yk5JObUMM52cAGa_rV9NyRksGDl/exec";

let lastScan = "";

async function loadSheets(){

try{

const response = await fetch(`${SCRIPT_URL}?action=getSheets`);
const sheets = await response.json();

const dropdown = document.getElementById("sheetSelect");
dropdown.innerHTML="";

sheets.forEach(name=>{
let option=document.createElement("option");
option.value=name;
option.textContent=name;
dropdown.appendChild(option);
});

}catch(err){

document.getElementById("status").innerText="Failed to load sheets";
console.error(err);

}

}

async function sendToSheet(code){

const sheetName=document.getElementById("sheetSelect").value;

try{

await fetch(SCRIPT_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code,
sheetName:sheetName
})
});

document.getElementById("status").innerText="Saved: "+code;

}catch(err){

document.getElementById("status").innerText="Error saving scan";

}

}

function onScanSuccess(decodedText){

if(decodedText===lastScan) return;

lastScan=decodedText;

document.getElementById("status").innerText="Scanned: "+decodedText;

sendToSheet(decodedText);

setTimeout(()=>lastScan="",2000);

}

function startScanner(){

const html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

}

loadSheets();
startScanner();

</script>

</body>
</html>
